<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dobby's Army - Tool Has Moved</title>
    <style>
        body {
            background-color: #0b1426; /* Dark navy from your screenshot */
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            padding: 3rem;
            border-radius: 15px;
            border: 2px solid #c5a059; /* Gold border */
            max-width: 800px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .header-img {
            max-width: 300px;
            margin-bottom: 1.5rem;
        }

        h1 {
            color: #c5a059;
            font-variant: small-caps;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            letter-spacing: 2px;
        }

        p {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .dobby-scene {
            width: 100%;
            height: auto;
            border-radius: 8px;
            border: 1px solid #3e4a61;
            margin-bottom: 2rem;
        }

        .btn {
            display: inline-block;
            background: linear-gradient(145deg, #d4af37, #aa8a2e);
            color: #0b1426;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            text-decoration: none;
            border-radius: 50px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            text-transform: uppercase;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(197, 160, 89, 0.4);
            background: linear-gradient(145deg, #e5c158, #c5a059);
        }

        .url-text {
            display: block;
            margin-top: 1rem;
            color: #8a9bb8;
            font-size: 0.9rem;
        }

        .footer-note {
            margin-top: 2rem;
            font-style: italic;
            color: #62718d;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Tool Has Moved</h1>
        
        <p>Master has given Dobby a new URL! <br> 
           Our Attendance and Guild Roster tools have set off for a grander dwelling.</p>

        <img src="src/dobbymoved.png" alt="Dobby walking to the new location" class="dobby-scene">

        <div>
            <a href="https://sockbot.dobby-is-free.com/raffle class="btn">Go to the New Home</a>
            <a href="https://sockbot.dobby-is-free.com/raffle" class="url-text">https://sockbot.dobby-is-free.com/raffle/</a>
        </div>

        <p class="footer-note">Praise Joko. Dobby is Free.</p>
    </div>

</body>
</html>
